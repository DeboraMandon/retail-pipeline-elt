version: 2

models:
  - name: stg_orders
    description: "Commandes nettoyées depuis raw.orders"
    columns:
      - name: order_id
        description: "Identifiant unique de la commande"
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: order_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['delivered', 'shipped', 'canceled', 'unavailable',
                         'invoiced', 'processing', 'created', 'approved']

  - name: stg_customers
    description: "Clients nettoyés depuis raw.customers"
    columns:
      - name: customer_id
        description: "Identifiant unique du client"
        tests:
          - unique
          - not_null
      - name: customer_unique_id
        tests:
          - not_null
      - name: customer_state
        tests:
          - not_null

  - name: stg_order_items
    description: "Lignes de commande nettoyées depuis raw.order_items"
    columns:
      - name: order_id
        tests:
          - not_null
      - name: order_item_id
        tests:
          - not_null
      - name: price
        tests:
          - not_null